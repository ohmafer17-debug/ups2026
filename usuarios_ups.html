<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UPGRADE SYSTEMS | Aprovisionamiento de Cuentas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        :root { --sidebar: #111827; --accent: #3b82f6; --bg: #f9fafb; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-weight: 700; margin-bottom: 40px; font-size: 1.2rem; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; color: #9ca3af; text-decoration: none; border-radius: 10px; margin-bottom: 5px; font-weight: 500; }
        .nav-item.active, .nav-item:hover { background: #1f2937; color: white; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .form-section { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { background: var(--accent); color: white; padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; font-weight: 600; color: #475569; }
        .badge-status { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
        .badge-status.active { background: #dcfce7; color: #15803d; }
        .badge-status.inactive { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="#" class="logo"><i class="fas fa-layer-group" style="color:var(--accent)"></i> Upgrade Systems</a>
        <a href="index_ups.html" class="nav-item"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a href="usuarios_ups.html" class="nav-item active"><i class="fas fa-building"></i> Alta de Clientes</a>
        <a href="documentos_ups.html" class="nav-item"><i class="fas fa-shield-check"></i> Auditoría Semáforo</a>
        <a href="visualizacion.html" class="nav-item"><i class="fas fa-folder-open"></i> Vista de Confirmación</a>
    </div>
    <div class="main-content">
        <h2>Aprovisionamiento Jerárquico de Cuentas Cliente</h2>
        <div class="form-section">
            <form id="formEmpresa">
                <div class="grid-inputs">
                    <input type="text" id="nom" placeholder="Nombre de la Unidad/Sucursal (Ej: Tienda Toluca Walmart)" required>
                    <input type="text" id="codigo" placeholder="Código Único de Repositorio (Ej: WAL-TOL)" required>
                    <input type="email" id="em" placeholder="Correo del Responsable Nacional" required>
                    <input type="text" id="cl" placeholder="Contraseña Temporal" required>
                </div>
                <button type="submit" class="btn-submit">Dar de Alta Cuenta</button>
            </form>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Unidad del Cliente</th>
                    <th>Email del Responsable</th>
                    <th>Contraseña</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="listaEmpresas"></tbody>
        </table>
    </div>
    <script>
        if (!localStorage.getItem('ups_session_token')) window.location.href = "login_ups.html";
        
        document.getElementById('formEmpresa').onsubmit = (e) => {
            e.preventDefault();
            const emps = JSON.parse(localStorage.getItem('ups_empresas_v3')) || [];
            const nuevo = {
                cod: document.getElementById('codigo').value.trim().toUpperCase(),
                nombre: document.getElementById('nom').value.trim(),
                email: document.getElementById('em').value.trim(),
                pass: document.getElementById('cl').value,
                activo: true
            };
            if(emps.some(x => x.cod === nuevo.cod)) return alert("El código de repositorio ya existe.");
            emps.push(nuevo);
            localStorage.setItem('ups_empresas_v3', JSON.stringify(emps));
            document.getElementById('formEmpresa').reset();
            render();
        };

        function cambiarEstado(cod) {
            const emps = JSON.parse(localStorage.getItem('ups_empresas_v3')) || [];
            const i = emps.findIndex(x => x.cod === cod);
            if(i !== -1) {
                emps[i].activo = !emps[i].activo;
                localStorage.setItem('ups_empresas_v3', JSON.stringify(emps));
                render();
            }
        }

        function render() {
            const emps = JSON.parse(localStorage.getItem('ups_empresas_v3')) || [];
            document.getElementById('listaEmpresas').innerHTML = emps.map(e => `
                <tr>
                    <td><b>${e.cod}</b></td>
                    <td>${e.nombre}</td>
                    <td>${e.email}</td>
                    <td><code>${e.pass}</code></td>
                    <td><span class="badge-status ${e.activo?'active':'inactive'}">${e.activo?'Activo':'Suspendido'}</span></td>
                    <td>
                        <button onclick="cambiarEstado('${e.cod}')" style="background:none; border:none; color:#3b82f6; cursor:pointer; font-weight:600;">
                            ${e.activo?'Desactivar':'Reactivar'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        window.onload = render;
    </script>
</body>
</html>
