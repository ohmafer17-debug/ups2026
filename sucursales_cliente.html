<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PC-CLOUD | Control de Sucursales</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600;700&display=swap');
        :root { --sidebar: #111827; --accent: #10b981; --bg: #f9fafb; --primary: #3b82f6; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-weight: 700; margin-bottom: 40px; padding-left: 10px; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; color: #9ca3af; text-decoration: none; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #1f2937; color: white; }
        .nav-item.active { border-left: 4px solid var(--accent); }
        .btn-logout { margin-top: auto; color: #ef4444; cursor: pointer; border: none; background: none; padding: 12px; font-weight: 600; display: flex; align-items: center; gap: 12px; }
        
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 25px; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 0.8rem; font-weight: 600; color: #475569; margin-bottom: 5px; }
        input, select { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; outline: none; font-family: 'Inter', sans-serif; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        th { color: #64748b; text-transform: uppercase; font-size: 0.75rem; }
        .badge-id { background:#f0fdf4; color:#166534; padding:4px 8px; border-radius:6px; font-weight:700; }
        .select-dinamico { padding: 5px; border-radius: 6px; font-size: 0.8rem; border: 1px solid #cbd5e1; background: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><i class="fas fa-shield-halved" style="color: var(--accent);"></i> PC-CLOUD</div>
        <a href="index_cliente.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="usuarios_cliente.html" class="nav-item"><i class="fas fa-users"></i> Usuarios</a>
        <a href="sucursales_cliente.html" class="nav-item active"><i class="fas fa-store"></i> Sucursales / Tiendas</a>
        <a href="documentos_cliente.html" class="nav-item"><i class="fas fa-folder-open"></i> Documentos</a>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-power-off"></i> Cerrar Sesión</button>
    </div>

    <div class="main">
        <h1>Estructura de Nodos y Sucursales</h1>
        
        <div class="card">
            <h3>Registrar Nodo Filial (Toma el Rol inicial de Consultor)</h3>
            <form id="sucursalForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre de la Sucursal</label>
                        <input type="text" id="sucNombre" placeholder="Ej. Velvet Lashes Sucursal Toluca" required>
                    </div>
                    <div class="form-group">
                        <label>Email de Acceso Primario</label>
                        <input type="email" id="sucEmail" placeholder="toluca@velvet.com" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña Asignada</label>
                        <input type="text" id="sucPass" placeholder="Contraseña inicial" required>
                    </div>
                </div>
                <button type="submit" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:600; cursor:pointer;">Vincular Sucursal</button>
            </form>
        </div>

        <div class="card">
            <h3>Nuestras Sucursales e Inversión de Puestos</h3>
            <table>
                <thead>
                    <tr>
                        <th>Código ID</th>
                        <th>Nombre de Unidad</th>
                        <th>Usuario (Email)</th>
                        <th>Contraseña</th>
                        <th>Rol Asignado (Modificable)</th>
                    </tr>
                </thead>
                <tbody id="tablaSucursales"></tbody>
            </table>
        </div>
    </div>

    <script>
        const idCorporativoPadre = localStorage.getItem('sesion_cliente_id');
        const miRol = localStorage.getItem('sesion_rol');

        if (miRol !== "Administrador" && miRol !== "Consultor" && miRol !== "Responsable Nacional") {
            window.location.href = 'index_cliente.html';
        }

        function logout() {
            localStorage.removeItem('sesion_cliente_id');
            localStorage.removeItem('sesion_rol');
            localStorage.removeItem('sesion_nombre_usuario');
            window.location.href = 'login_cliente.html';
        }

        function generarCodigoSucursal() {
            const caracteres = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let result = "";
            for (let i = 0; i < 3; i++) result += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
            result += Math.floor(100 + Math.random() * 900);
            return result;
        }

        document.getElementById('sucursalForm').onsubmit = function(e) {
            e.preventDefault();
            const empresasMaster = JSON.parse(localStorage.getItem('ups_empresas_v3')) || [];
            
            const nuevaSucursal = {
                cod: generarCodigoSucursal(),
                nombre: document.getElementById('sucNombre').value.trim(),
                email: document.getElementById('sucEmail').value.trim(),
                pass: document.getElementById('sucPass').value,
                corporativoPadre: idCorporativoPadre, 
                rolAsignado: "Consultor", // Por defecto, toma el nivel de Consultor según el organigrama
                activo: true
            };

            empresasMaster.push(nuevaSucursal);
            localStorage.setItem('ups_empresas_v3', JSON.stringify(empresasMaster));
            document.getElementById('sucursalForm').reset();
            renderSucursales();
        };

        // ACCIÓN CLAVE: Cambiar el puesto/rol de la sucursal de manera directa
        function cambiarRolSucursal(codigo, nuevoRol) {
            const empresasMaster = JSON.parse(localStorage.getItem('ups_empresas_v3')) || [];
            const emp = empresasMaster.find(e => e.cod === codigo);
            if(emp) {
                emp.rolAsignado = nuevoRol;
                localStorage.setItem('ups_empresas_v3', JSON.stringify(empresasMaster));
                alert("Puesto de la sucursal actualizado correctamente.");
            }
        }

        function renderSucursales() {
            const empresasMaster = JSON.parse(localStorage.getItem('ups_empresas_v3')) || [];
            const tbody = document.getElementById('tablaSucursales');
            tbody.innerHTML = '';

            const misSucursales = empresasMaster.filter(e => e.corporativoPadre === idCorporativoPadre);

            misSucursales.forEach(s => {
                const rolActual = s.rolAsignado || "Consultor";
                
                tbody.innerHTML += `
                    <tr>
                        <td><span class="badge-id">${s.cod}</span></td>
                        <td><strong>${s.nombre}</strong></td>
                        <td><code>${s.email}</code></td>
                        <td><code>${s.pass}</code></td>
                        <td>
                            <select class="select-dinamico" onchange="cambiarRolSucursal('${s.cod}', this.value)">
                                <option value="Consultor" ${rolActual === 'Consultor' ? 'selected' : ''}>Consultor</option>
                                <option value="Administrador" ${rolActual === 'Administrador' ? 'selected' : ''}>Administrador</option>
                                <option value="Responsable Nacional" ${rolActual === 'Responsable Nacional' ? 'selected' : ''}>Responsable Nacional</option>
                                <option value="Tipo 1" ${rolActual === 'Tipo 1' ? 'selected' : ''}>Tipo 1</option>
                                <option value="Tipo 2" ${rolActual === 'Tipo 2' ? 'selected' : ''}>Tipo 2</option>
                                <option value="Tipo 3" ${rolActual === 'Tipo 3' ? 'selected' : ''}>Tipo 3</option>
                            </select>
                        </td>
                    </tr>
                `;
            });

            if (misSucursales.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#94a3b8; padding:15px;">No hay sucursales subordinadas registradas.</td></tr>`;
            }
        }

        renderSucursales();
    </script>
</body>
</html>
