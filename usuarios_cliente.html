<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UPGRADE SYSTEMS | Gestión de Usuarios Clientes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        :root { --ups-blue: #0f172a; --ups-accent: #3b82f6; --ups-green: #10b981; --ups-red: #ef4444; --bg-gray: #f8fafc; --text-main: #334155; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-gray); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: var(--ups-blue); color: white; display: flex; flex-direction: column; padding: 30px 20px; box-sizing: border-box; }
        .sidebar .brand { font-size: 1.4rem; font-weight: 700; margin-bottom: 40px; display: flex; align-items: center; gap: 12px; letter-spacing: 0.5px; }
        .sidebar .brand i { color: var(--ups-accent); }
        .sidebar-title { font-size: 0.75rem; text-transform: uppercase; color: #64748b; font-weight: 700; margin-bottom: 15px; padding-left: 10px; }
        .menu-items { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        .menu-items li a { color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 12px; font-size: 0.95rem; font-weight: 500; }
        .menu-items li.active a { background: rgba(59, 130, 246, 0.15); color: #3b82f6; font-weight: 600; }
        .main-content { flex: 1; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        .header-dashboard { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; border-bottom: 2px solid #e2e8f0; padding-bottom: 25px; }
        .header-dashboard h1 { margin: 0; font-size: 1.7rem; font-weight: 700; color: #1e293b; }
        .form-box { background: white; padding: 32px; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; margin-bottom: 40px; max-width: 700px; }
        .form-box h2 { margin-top: 0; font-size: 1.2rem; margin-bottom: 25px; color: #1e293b; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .form-box h2 i { color: var(--ups-accent); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 5px; }
        .form-group.full { grid-column: span 2; }
        .form-box label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-box input, .form-box select { width: 100%; padding: 13px 16px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 0.95rem; background: #f8fafc; }
        .btn-submit { background: var(--ups-accent); color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }
        .error-lock { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; padding: 20px; border-radius: 12px; display: none; align-items: center; gap: 15px; font-weight: 600; max-width: 700px; }
        .table-container { background: white; border-radius: 20px; padding: 32px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 16px; color: #475569; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; text-align: left; }
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: inline-block; }
        .badge.role { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand"><i class="fas fa-terminal"></i> UPGRADE SYSTEMS</div>
        <div class="sidebar-title">Panel de Control</div>
        <ul class="menu-items">
            <li class="active"><a><i class="fas fa-users"></i> Control de Roles</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-dashboard">
            <div>
                <h1>Estructura de Permisos de Creación</h1>
                <p style="color: #64748b; margin: 5px 0 0 0;">Rol Detectado: <strong id="lblMiRol" style="color: var(--ups-accent);">Cargando...</strong></p>
            </div>
        </div>

        <div id="lockMessage" class="error-lock">
            <i class="fas fa-user-slash fa-2x"></i>
            <div>Tu rango actual no cuenta con privilegios para dar de alta nuevos usuarios.</div>
        </div>

        <div id="formContainer" class="form-box">
            <h2><i class="fas fa-user-plus"></i> Registrar Nuevo Usuario</h2>
            <form id="altaUsuarioForm">
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Nombre del Colaborador</label>
                        <input type="text" id="usrNombre" placeholder="Ej: Juan Pérez" required>
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="usrEmail" placeholder="correo@empresa.com" required>
                    </div>
                    <div class="form-group">
                        <label>Rol Asignado</label>
                        <select id="usrRol" required>
                            </select>
                    </div>
                    <div class="form-group full">
                        <label>Contraseña de Acceso</label>
                        <input type="password" id="usrPass" required>
                    </div>
                </div>
                <br>
                <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Guardar Usuario</button>
            </form>
        </div>

        <div class="table-container">
            <h2>Personal Registrado</h2>
            <table>
                <thead>
                    <tr><th>Nombre</th><th>Correo</th><th>Rol del Usuario</th></tr>
                </thead>
                <tbody id="tablaUsuariosBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let ROL_ACTUAL_SISTEMA = 'Consultor'; // Por defecto si no detecta nada

        document.addEventListener("DOMContentLoaded", () => {
            // 🚀 ESTRATEGIA DEFINITIVA: Leer el rol directamente desde la URL de la barra de direcciones
            // Ejemplo: usuarios_clientes.html?rol=Consultor
            const valoresUrl = window.location.search;
            const urlParams = new URLSearchParams(valoresUrl);
            const rolUrl = urlParams.get('rol');

            if (rolUrl) {
                ROL_ACTUAL_SISTEMA = rolUrl;
            }

            document.getElementById('lblMiRol').innerText = ROL_ACTUAL_SISTEMA;
            forzarRenderizadoRoles(ROL_ACTUAL_SISTEMA);
            cargarUsuarios();
        });

        function forzarRenderizadoRoles(rol) {
            const selectRol = document.getElementById('usrRol');
            const formContainer = document.getElementById('formContainer');
            const lockMessage = document.getElementById('lockMessage');

            // Limpieza absoluta del select para que no guarde basura de XAMPP
            selectRol.options.length = 0; 

            if (rol.toLowerCase() === 'administrador') {
                selectRol.innerHTML = `
                    <option value="Consultor">Consultor</option>
                    <option value="Responsable Nacional">Responsable Nacional</option>
                    <option value="Tipo 1">Tipo 1</option>
                    <option value="Tipo 2">Tipo 2</option>
                    <option value="Tipo 3">Tipo 3</option>`;
            } 
            else if (rol.toLowerCase() === 'consultor') {
                // 🔥 AQUÍ ESTÁ EL CANDADO INYECTADO: Responsable Nacional, Tipo 1, Tipo 2 y Tipo 3 completos
                selectRol.innerHTML = `
                    <option value="Responsable Nacional">Responsable Nacional</option>
                    <option value="Tipo 1">Tipo 1</option>
                    <option value="Tipo 2">Tipo 2</option>
                    <option value="Tipo 3">Tipo 3</option>`;
            } 
            else if (rol.toLowerCase() === 'tipo 1') {
                selectRol.innerHTML = `
                    <option value="Tipo 1">Tipo 1</option>
                    <option value="Tipo 2">Tipo 2</option>
                    <option value="Tipo 3">Tipo 3</option>`;
            } 
            else if (rol.toLowerCase() === 'tipo 2' || rol.toLowerCase() === 'tipo 3') {
                formContainer.style.display = 'none';
                lockMessage.style.display = 'flex';
            }
        }

        document.getElementById('altaUsuarioForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const payload = {
                accion: 'registrar_usuario_rol',
                rol_creador: ROL_ACTUAL_SISTEMA,
                nombre: document.getElementById('usrNombre').value.trim(),
                email: document.getElementById('usrEmail').value.trim(),
                rol: document.getElementById('usrRol').value,
                pass: document.getElementById('usrPass').value.trim()
            };

            const r = await fetch('usuarios_procesar.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const res = await r.json();
            if (res.status === 'success') {
                alert("¡Usuario guardado correctamente!");
                document.getElementById('altaUsuarioForm').reset();
                forzarRenderizadoRoles(ROL_ACTUAL_SISTEMA);
                cargarUsuarios();
            } else {
                alert("Error: " + res.message);
            }
        });

        async function cargarUsuarios() {
            try {
                const r = await fetch('usuarios_procesar.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ accion: 'listar_usuarios' }) });
                const res = await r.json();
                if (res.status === 'success') {
                    const t = document.getElementById('tablaUsuariosBody'); t.innerHTML = "";
                    res.data.forEach(u => {
                        t.innerHTML += `<tr><td><strong>${u.nombre}</strong></td><td><code>${u.email}</code></td><td><span class="badge role">${u.rol}</span></td></tr>`;
                    });
                }
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
