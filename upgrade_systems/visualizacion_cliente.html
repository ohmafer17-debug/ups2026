<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UPGRADE SYSTEMS | Mi Galería Documental</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 40px; margin:0; }
        .container { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top:20px; }
        .file-item { border: 1px solid #e2e8f0; padding: 20px; border-radius: 16px; text-align: center; background:#fff; }
        .file-item i { font-size: 2.5rem; color: #ef4444; margin-bottom: 10px; }
        .btn-view { background: #111827; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Mi Repositorio Histórico Protegido</h2>
        <div id="fileContainer" class="file-grid"></div>
    </div>
    <script>
        const idEmp = localStorage.getItem('sesion_cliente_id');
        
        function render() {
            const docs = JSON.parse(localStorage.getItem('docs_' + idEmp)) || [];
            const container = document.getElementById('fileContainer');
            
            // BORRADO LÓGICO: Ocultar de la vista los archivos desactivados
            const activos = docs.filter(d => d.activo !== false);

            if(activos.length === 0) {
                container.innerHTML = "<p style='color:#64748b;'>No hay requerimientos activos en este repositorio.</p>";
                return;
            }

            container.innerHTML = activos.map((d, i) => `
                <div class="file-item">
                    <i class="fas fa-file-pdf"></i>
                    <h4 style="margin: 5px 0;">${d.nombre}</h4>
                    <p style="font-size:0.8rem; color:#64748b; margin-bottom:15px;">Vence el: ${d.fecha}</p>
                    <button class="btn-view" onclick="abrirEvidencia('${d.nombre}')">Visualizar PDF</button>
                </div>
            `).join('');
        }

        function abrirEvidencia(nombre) {
            alert(`Visualizando de forma segura el archivo: ${nombre}\n(Esta acción simula la apertura del contenedor binario Blob en el servidor local).`);
        }
        window.onload = render;
    </script>
</body>
</html>
