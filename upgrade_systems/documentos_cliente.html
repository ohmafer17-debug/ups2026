<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UPGRADE SYSTEMS | Carga Documental</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        :root { --sidebar: #111827; --accent: #10b981; --bg: #f9fafb; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-weight: 700; margin-bottom: 40px; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; color: #9ca3af; text-decoration: none; border-radius: 10px; margin-bottom: 5px; }
        .nav-item.active, .nav-item:hover { background: #1f2937; color: white; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .form-section { background: white; padding: 25px; border-radius: 16px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><i class="fas fa-shield" style="color:var(--accent)"></i> Cliente Panel</div>
        <a href="index_cliente.html" class="nav-item"><i class="fas fa-home"></i> Inicio</a>
        <a href="documentos_cliente.html" class="nav-item active"><i class="fas fa-file-upload"></i> Subir Documentos</a>
        <a href="usuarios_cliente.html" class="nav-item"><i class="fas fa-users"></i> Control de Turnos</a>
        <a href="visualizacion_cliente.html" class="nav-item"><i class="fas fa-images"></i> Mi Repositorio</a>
    </div>
    <div class="main-content">
        <h2>Gestión Operativa de Requerimientos</h2>
        <div class="form-section" id="zonaCarga">
            <form id="formDoc">
                <input type="text" id="nomDoc" placeholder="Nombre del Requerimiento (Ej: Plan de Contingencia)" required style="width:30%; padding:10px; margin-right:10px;">
                <input type="date" id="fVenc" required style="padding:10px; margin-right:10px;">
                <button type="submit" style="background:var(--accent); color:white; padding:10px 20px; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Cargar Archivo</button>
            </form>
        </div>
        <table>
            <thead><tr><th>Semáforo</th><th>Documento</th><th>Carga</th><th>Vencimiento</th><th>Acciones</th></tr></thead>
            <tbody id="tablaDocs"></tbody>
        </table>
    </div>
    <script>
        const idEmp = localStorage.getItem('sesion_cliente_id');
        const miRol = localStorage.getItem('sesion_rol');
        
        // REGLA DE ROL: Tipo 2 y Tipo 3 no pueden subir archivos nuevos según la matriz
        if(miRol === "Tipo 2" || miRol === "Tipo 3") {
            document.getElementById('zonaCarga').innerHTML = "<p style='color:#ef4444; font-weight:600;'><i class='fas fa-ban'></i> Su rol actual no cuenta con permisos para cargar o inyectar nuevos archivos.</p>";
        }

        document.getElementById('formDoc').onsubmit = (e) => {
            e.preventDefault();
            const docs = JSON.parse(localStorage.getItem('docs_' + idEmp)) || [];
            const nuevo = {
                id: Date.now(),
                nombre: document.getElementById('nomDoc').value.trim(),
                fecha: document.getElementById('fVenc').value,
                fechaSubida: new Date().toLocaleDateString(),
                activo: true
            };
            docs.push(nuevo);
            localStorage.setItem('docs_' + idEmp, JSON.stringify(docs));
            document.getElementById('formDoc').reset();
            render();
        };

        function cambiarEstadoDoc(id) {
            if(miRol === "Tipo 3") return alert("Permiso Denegado.");
            const docs = JSON.parse(localStorage.getItem('docs_' + idEmp)) || [];
            const i = docs.findIndex(x => x.id === id);
            if(i !== -1) {
                docs[i].activo = !docs[i].activo;
                localStorage.setItem('docs_' + idEmp, JSON.stringify(docs));
                render();
            }
        }

        function render() {
            const docs = JSON.parse(localStorage.getItem('docs_' + idEmp)) || [];
            const tbody = document.getElementById('tablaDocs');
            tbody.innerHTML = docs.map(d => {
                const hoy = new Date(); hoy.setHours(0,0,0,0);
                const diff = Math.ceil((new Date(d.fecha) - hoy)/(1000*60*60*24));
                
                let color = "#10b981";
                if(!d.activo || diff <= 0) color = "#ef4444";
                else if(diff >= 1 && diff <= 30) color = "#f59e0b";

                return `
                    <tr>
                        <td><i class="fas fa-circle" style="color:${color}"></i></td>
                        <td>${d.nombre}</td>
                        <td>${d.fechaSubida}</td>
                        <td>${d.fecha}</td>
                        <td>
                            <button onclick="cambiarEstadoDoc(${d.id})" style="background:none; border:none; color:#3b82f6; cursor:pointer; font-weight:600;">
                                ${d.activo?'Desactivar (Borrado Lógico)':'Activar'}
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        window.onload = render;
    </script>
</body>
</html>
