<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UPGRADE SYSTEMS | Confirmación Exclusiva</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        :root { --sidebar: #111827; --accent: #3b82f6; --bg: #f9fafb; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-weight: 700; margin-bottom: 40px; font-size: 1.2rem; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; color: #9ca3af; text-decoration: none; border-radius: 10px; margin-bottom: 5px; font-weight: 500; }
        .nav-item.active, .nav-item:hover { background: #1f2937; color: white; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .file-status-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .badge-secure { background: #e0f2fe; color: #0369a1; padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="#" class="logo"><i class="fas fa-layer-group" style="color:var(--accent)"></i> Upgrade Systems</a>
        <a href="index_ups.html" class="nav-item"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a href="usuarios_ups.html" class="nav-item"><i class="fas fa-building"></i> Alta de Clientes</a>
        <a href="documentos_ups.html" class="nav-item"><i class="fas fa-shield-check"></i> Auditoría Semáforo</a>
        <a href="visualizacion.html" class="nav-item active"><i class="fas fa-folder-open"></i> Vista de Confirmación</a>
    </div>
    <div class="main-content">
        <h2>Panel de Evidencia Digital (Verificación sin acceso a contenido)</h2>
        <p style="color:#64748b; margin-bottom:25px;"><i class="fas fa-user-lock"></i> Lógica de Privacidad Activa: Confirmando almacenamiento en servidor de archivos cifrados.</p>
        <div id="contenedorVerificacion"></div>
    </div>
    <script>
        if (!localStorage.getItem('ups_session_token')) window.location.href = "login_ups.html";

        function cargarEvidencias() {
            const emps = JSON.parse(localStorage.getItem('ups_empresas_v3')) || [];
            const container = document.getElementById('contenedorVerificacion');
            let html = "";

            emps.forEach(emp => {
                const docs = JSON.parse(localStorage.getItem('docs_' + emp.cod)) || [];
                docs.forEach(d => {
                    html += `
                        <div class="file-status-card">
                            <div>
                                <h4 style="margin:0; color:#1e293b;">${d.nombre}</h4>
                                <span style="font-size:0.85rem; color:#64748b;">Organización: <b>${emp.nombre}</b> [${emp.cod}]</span>
                            </div>
                            <span class="badge-secure"><i class="fas fa-file-check"></i> Existencia Confirmada (Contenido Privado)</span>
                        </div>
                    `;
                });
            });
            container.innerHTML = html || '<p style="color:#64748b;">No hay archivos cargados para verificar en este momento.</p>';
        }
        window.onload = cargarEvidencias;
    </script>
</body>
</html>
