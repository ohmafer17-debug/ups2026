<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Upgrade Systems | Acceso Corporativo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #1e3a8a; text-align: center; margin-bottom: 25px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #475569; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; margin-bottom: 20px; font-size: 0.95rem; outline: none; }
        input:focus { border-color: #2563eb; }
        button { background: #1e3a8a; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1e40af; }
        button:disabled { background: #64748b !important; cursor: not-allowed; }
        .alert-danger { display: none; padding: 12px; background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; border-radius: 8px; font-size: 0.85rem; font-weight: 500; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2><i class="fas fa-shield-halved"></i> Iniciar Sesión</h2>
        
        <div id="alertBox" class="alert-danger"></div>

        <form id="formLoginGlobal">
            <label>Correo Electrónico</label>
            <input type="email" id="loginEmail" placeholder="ejemplo@empresa.com" required>
            
            <label>Contraseña de Acceso</label>
            <input type="password" id="loginPass" placeholder="••••••••" required>
            
            <button type="submit" id="btnSubmitLogin">Ingresar al Sistema</button>
        </form>
    </div>

    <script>
        // Al cargar el DOM, validamos si existe un bloqueo por tiempo remanente activo
        document.addEventListener("DOMContentLoaded", () => {
            verificarBloqueoActivo();
        });

        document.getElementById('formLoginGlobal').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (verificarBloqueoActivo()) return;

            const msgBox = document.getElementById('alertBox');
            msgBox.style.display = "none";
            
            const payload = {
                email: document.getElementById('loginEmail').value.trim(),
                pass: document.getElementById('loginPass').value.trim()
            };

            try {
                const r = await fetch('./login_procesar.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!r.ok) { throw new Error("HTTP estatus: " + r.status); }
                const res = await r.json();

                if (res.status === 'success') {
                    // Limpiamos los intentos al entrar con éxito
                    sessionStorage.removeItem('login_intentos_fallidos');
                    localStorage.setItem('cliente_sesion_id', res.id_cliente);
                    localStorage.setItem('cliente_sesion_nombre', res.nombre_usuario);
                    localStorage.setItem('cliente_sesion_rol', res.rol_usuario);

                    alert(res.message);
                    
                    if (res.rol_usuario === 'Administrador' && res.id_cliente === 'UPS-STAFF') {
                        window.location.href = "index_ups.html";
                    } else {
                        window.location.href = "index_cliente.html";
                    }
                } else {
                    // 🚀 CONTROL DE INTENTOS
                    registrarIntentoFallido(res.message);
                }
            } catch (error) {
                console.error(error);
                msgBox.innerText = "Error de red: No se pudo conectar con el servidor local.";
                msgBox.style.display = "block";
            }
        });

        function registrarIntentoFallido(mensajeServidor) {
            const msgBox = document.getElementById('alertBox');
            let intentos = parseInt(sessionStorage.getItem('login_intentos_fallidos')) || 0;
            intentos++;
            sessionStorage.setItem('login_intentos_fallidos', intentos);

            if (intentos >= 3) {
                // Disparamos el bloqueo de 20 segundos guardando la marca de tiempo de expiración
                const tiempoBloqueoHasta = Date.now() + 20000;
                localStorage.setItem('login_bloqueado_hasta', tiempoBloqueoHasta);
                verificarBloqueoActivo();
            } else {
                msgBox.innerHTML = `<strong>Acceso Denegado:</strong> ${mensajeServidor}<br><span style="font-size:0.8rem;">Intentos restantes: ${3 - intentos}</span>`;
                msgBox.style.display = "block";
            }
        }

        function verificarBloqueoActivo() {
            const btn = document.getElementById('btnSubmitLogin');
            const msgBox = document.getElementById('alertBox');
            const bloqueoHasta = localStorage.getItem('login_bloqueado_hasta');

            if (bloqueoHasta && Date.now() < bloqueoHasta) {
                btn.disabled = true;
                
                const intervalo = setInterval(() => {
                    const tiempoRestante = Math.ceil((bloqueoHasta - Date.now()) / 1000);
                    
                    if (tiempoRestante <= 0) {
                        clearInterval(intervalo);
                        localStorage.removeItem('login_bloqueado_hasta');
                        sessionStorage.removeItem('login_intentos_fallidos');
                        btn.disabled = false;
                        btn.innerText = "Ingresar al Sistema";
                        msgBox.style.display = "none";
                    } else {
                        btn.innerText = `Bloqueado (${tiempoRestante}s)`;
                        msgBox.innerHTML = `<i class="fas fa-lock"></i> <strong>Formulario Congelado:</strong> Demasiados intentos fallidos. Inténtalo de nuevo en ${tiempoRestante} segundos.`;
                        msgBox.style.display = "block";
                    }
                }, 1000);

                return true;
            }
            return false;
        }
    </script>
</body>
</html>
