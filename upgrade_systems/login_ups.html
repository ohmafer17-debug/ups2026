<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPGRADE SYSTEMS | Acceso Máster</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root {
            --primary-bg: #0f172a; --card-bg: #ffffff; --text-main: #1e293b;
            --text-muted: #64748b; --accent-green: #10b981; --input-border: #e2e8f0; --input-focus: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--primary-bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .login-container { background: var(--card-bg); padding: 45px 40px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); box-sizing: border-box; }
        .brand-header { text-align: center; margin-bottom: 35px; }
        .brand-header .logo-icon { font-size: 2.2rem; color: var(--accent-green); margin-bottom: 10px; }
        .brand-header h1 { margin: 0; font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.02em; }
        .brand-header p { margin: 6px 0 0 0; font-size: 0.9rem; color: var(--text-muted); }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-main); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.95rem; }
        .form-group input { width: 100%; padding: 12px 14px 12px 42px; border: 1px solid var(--input-border); border-radius: 12px; font-size: 0.95rem; color: var(--text-main); background: #f8fafc; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: var(--input-focus); background: #ffffff; }
        .btn-login { width: 100%; background: var(--primary-bg); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-login:hover { background: #1e293b; }
        .btn-login:disabled { background: #64748b !important; cursor: not-allowed; }
        .alert-box { display: none; padding: 12px; border-radius: 10px; font-size: 0.85rem; font-weight: 500; margin-bottom: 20px; text-align: center; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-header">
            <div class="logo-icon"><i class="fas fa-user-gear"></i></div>
            <h1>UPGRADE SYSTEMS</h1>
            <p>Consola Máster de Administración</p>
        </div>

        <div id="alertContainer" class="alert-box"></div>

        <form id="loginUpsForm">
            <div class="form-group">
                <label for="email">Correo Administrador</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="nombre@upgradesystems.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnSubmitUps">
                <span>Ingresar al Panel Máster</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            verificarBloqueoUps();
        });

        if (window.location.protocol === 'file:') {
            window.location.href = `http://localhost:8080/upgrade_systems/login_ups.html`;
        }

        document.getElementById('loginUpsForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (verificarBloqueoUps()) return;

            const alertContainer = document.getElementById('alertContainer');
            alertContainer.style.display = "none";

            const payload = {
                email: document.getElementById('email').value.trim(),
                pass: document.getElementById('password').value.trim()
            };

            try {
                const respuesta = await fetch('./login_procesar.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!respuesta.ok) { throw new Error("HTTP estatus: " + respuesta.status); }
                const resultado = await respuesta.json();

                if (resultado.status === 'success') {
                    sessionStorage.removeItem('ups_intentos_fallidos');
                    if (resultado.id_cliente === 'UPS-STAFF' || resultado.rol_usuario === 'Administrador') {
                        localStorage.setItem('ups_sesion_id', resultado.id_cliente);
                        localStorage.setItem('ups_sesion_nombre', resultado.nombre_usuario);
                        localStorage.setItem('cliente_sesion_rol', resultado.rol_usuario);
                        window.location.href = './index_ups.html';
                    }
                } else {
                    registrarIntentoFallidoUps(resultado.message);
                }
            } catch (error) {
                console.error(error);
                alertContainer.innerText = "Error de enlace con el backend.";
                alertContainer.style.display = "block";
            }
        });

        function registrarIntentoFallidoUps(mensajeServidor) {
            const alertContainer = document.getElementById('alertContainer');
            let intentos = parseInt(sessionStorage.getItem('ups_intentos_fallidos')) || 0;
            intentos++;
            sessionStorage.setItem('ups_intentos_fallidos', intentos);

            if (intentos >= 3) {
                const tiempoBloqueoHasta = Date.now() + 20000;
                localStorage.setItem('ups_bloqueado_hasta', tiempoBloqueoHasta);
                verificarBloqueoUps();
            } else {
                alertContainer.innerHTML = `<strong>Error:</strong> ${mensajeServidor}<br><span style="font-size:0.8rem;">Intentos restantes: ${3 - intentos}</span>`;
                alertContainer.style.display = "block";
            }
        }

        function verificarBloqueoUps() {
            const btn = document.getElementById('btnSubmitUps');
            const alertContainer = document.getElementById('alertContainer');
            const bloqueoHasta = localStorage.getItem('ups_bloqueado_hasta');

            if (bloqueoHasta && Date.now() < bloqueoHasta) {
                btn.disabled = true;
                const intervalo = setInterval(() => {
                    const tiempoRestante = Math.ceil((bloqueoHasta - Date.now()) / 1000);
                    if (tiempoRestante <= 0) {
                        clearInterval(intervalo);
                        localStorage.removeItem('ups_bloqueado_hasta');
                        sessionStorage.removeItem('ups_intentos_fallidos');
                        btn.disabled = false;
                        btn.querySelector('span').innerText = "Ingresar al Panel Máster";
                        alertContainer.style.display = "none";
                    } else {
                        btn.querySelector('span').innerText = `Bloqueado (${tiempoRestante}s)`;
                        alertContainer.innerHTML = `<strong>Consola Bloqueada:</strong> Inténtalo de nuevo en ${tiempoRestante} segundos.`;
                        alertContainer.style.display = "block";
                    }
                }, 1000);
                return true;
            }
            return false;
        }
    </script>
</body>
</html>
